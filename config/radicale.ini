[server]
# Listen on all interfaces — Tailscale handles network perimeter security
hosts = 0.0.0.0:5232

[auth]
# Simple htpasswd auth — Tailscale is the real network perimeter
type = htpasswd
htpasswd_filename = config/radicale_users
htpasswd_encryption = plain

[rights]
# Authenticated users can read and write all collections
type = authenticated

[storage]
# Store .ics files here; path is relative to the working directory (project root)
filesystem_folder = data/calendar

[logging]
level = warning
